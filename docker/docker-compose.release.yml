services:

  backend:
    image: aipoclab/avatar-backend:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/backend.env:/app/.env:ro
      - ./data/uploads:/data/uploads
      - ./data/users.db:/data/users.db
    environment:
      UPLOADS_DIR: /data/uploads
      DB_PATH:     /data/users.db
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 20s

  frontend:
    image: aipoclab/avatar-frontend:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - /etc/ssl/avatar:/etc/ssl/avatar:ro
    depends_on:
      backend:
        condition: service_healthy

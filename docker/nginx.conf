server {
    listen 80;
    server_name _;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    http2 on;

    ssl_certificate     /etc/ssl/avatar/fullchain.pem;
    ssl_certificate_key /etc/ssl/avatar/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    # ── Uploaded presentation slides — must come before static-assets regex ──
    # ^~ prevents Nginx from checking regex locations once this prefix matches.
    location ^~ /uploads/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # ── .mjs — clear inherited types, force JS MIME for ES module dynamic import
    location ~* \.mjs$ {
        types { }
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|glb|wasm|bin)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend proxy — API and auth ─────────────────────────────────────────
    location ~ ^/(api|auth)(/.*)?$ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering for streaming responses
        proxy_buffering    off;
        proxy_cache        off;

        # Long timeouts for LLM calls and large PPTX/PDF uploads
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        client_max_body_size 200m;
    }

    # ── SPA fallback — all other paths serve index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
